<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My_Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <!-- font lik -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <h1 class="logo">MyPortfolio</h1>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="section home">
        <h2>Hello, I'm victor</h2>
        <p>Frontend Developer | Designer | Dancer</p>
        <button id="cta">View My Work</button>
        <button id="cta2">My Resume</button>
    </section>

    <section id="about" class="section">
        <h2>About Me</h2>
        <p>I build clean and modern web applications using HTML, CSS, & JAVASCRIPT.</p>
    </section>

    <section id="project" class="section">
        <h2>Projects</h2>
        <div class="projects">
            <div class="card">Project 1</div>
            <div class="card">Project 2</div>
            <div class="card">Project 3</div>
        </div>
    </section>

    <section id="contact" class="section">
        <h2>Contact</h2>
        <form id="contactForm">
            <input type="text" placeholder="Your NAme" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>

    <footer class="footer">
        <p>@ 2026 Vikkymediatech. All rights reserved.</p>
    </footer>

    <script src="/script.js"></script>
</body>
</html>
